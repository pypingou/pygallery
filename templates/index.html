<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Photo Gallery</title>
    <meta name="description" content="A personal photo gallery showcasing albums and photos">
    <meta name="author" content="Photo Gallery">
    <meta name="keywords" content="photos, gallery, albums, images">
    
    <!-- Structured Data for SEO -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "ImageGallery",
        "name": "My Photo Gallery",
        "description": "A personal photo gallery showcasing albums and photos"
    }
    </script>
    
    <!-- Use url_for for static CSS file -->
    <link rel="stylesheet" href="{{ url_for('gallery.static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script>
        // No longer need to set window.BASE_URL_PREFIX here, script.js will derive it from URL
    </script>
</head>
<body>
    <!-- Skip to main content link for screen readers -->
    <a href="#main-content" class="sr-only-focusable">Skip to main content</a>
    
    <header class="header" role="banner">
        <h1 class="header-title">My Photo Gallery</h1>
        <p class="header-subtitle sr-only">Browse through photo albums and images</p>
    </header>

    <main id="main-content" class="container" role="main">
        <article class="gallery-content">
            <header class="gallery-header">
                <h2 class="sr-only">Photo Albums</h2>
                <p class="gallery-description sr-only">
                    Welcome to the photo gallery. Browse through the available albums below.
                </p>
            </header>
            
            <section id="album-list" class="grid-container" role="region" aria-label="Photo albums">
                <!-- Albums will be dynamically loaded here -->
            </section>
            
            <!-- Loading indicator -->
            <aside id="loading-indicator" class="loading-indicator" role="status" aria-live="polite" aria-label="Loading albums">
                <span class="sr-only">Loading photo albums...</span>
            </aside>
            
            <!-- Error message container -->
            <aside id="error-message" class="error-message" role="alert" aria-live="assertive" style="display: none;">
                <!-- Error messages will be displayed here -->
            </aside>
        </article>
    </main>

    <!-- The Lightbox Modal for large images -->
    <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-labelledby="lightbox-title" aria-describedby="lightbox-description" onclick="closeLightbox()">
        <div class="lightbox-content-wrapper">
            <header class="lightbox-header">
                <h2 id="lightbox-title" class="sr-only">Image viewer</h2>
                <button class="close-btn" aria-label="Close image viewer" title="Close (Esc)">&times;</button>
            </header>
            
            <!-- Navigation buttons -->
            <button class="lightbox-nav-btn prev-btn" id="prev-photo-btn" aria-label="Previous image" title="Previous image (←)">
                <span aria-hidden="true">&#10094;</span>
            </button>
            
            <figure class="lightbox-image-container">
                <img id="lightbox-img" class="lightbox-content" src="" alt="" role="img">
                <video id="lightbox-video" class="lightbox-content" style="display: none;">
                    Your browser does not support the video tag.
                </video>
                <div id="lightbox-video-overlay" class="lightbox-video-overlay" style="display: none;">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                </div>
                <figcaption id="lightbox-description" class="sr-only">
                    <!-- Media description will be set dynamically -->
                </figcaption>
            </figure>
            
            <button class="lightbox-nav-btn next-btn" id="next-photo-btn" aria-label="Next image" title="Next image (→)">
                <span aria-hidden="true">&#10095;</span>
            </button>
            
            <!-- Download and Share buttons -->
            <nav class="lightbox-controls-bottom" role="group" aria-label="Image actions">
                <button class="download-btn" id="download-photo-btn" aria-label="Download image" title="Download image">
                    <span aria-hidden="true">📥</span>
                    <span>Download</span>
                </button>
                <button class="share-btn" id="share-photo-btn" aria-label="Copy image link" title="Copy image link">
                    <span aria-hidden="true">🔗</span>
                    <span>Share Link</span>
                </button>
            </nav>
        </div>
        
        <!-- Message box for copy confirmation -->
        <aside id="message-box" class="message-box" role="status" aria-live="polite"></aside>
    </div>

    <footer class="footer" role="contentinfo">
        <p>Coded by Gemini upon instructions by pingou</p>
        <nav class="footer-nav sr-only">
            <a href="#main-content">Back to top</a>
        </nav>
    </footer>

    <!-- Use url_for for static JavaScript file -->
    <script src="{{ url_for('gallery.static', filename='js/script.js') }}"></script>
</body>
</html>
